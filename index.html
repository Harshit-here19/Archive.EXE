<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET | Personal Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="pet-frame">
        <header>
            <span id="logout-btn" class="pet-logout"></span>
            <div class="logo">PET_v3.0</div>
            <div id="status-light" class="offline"></div>
            <div class="sync-text" id="sync-status">SYSTEM OFFLINE</div>
        </header>

        <section id="chip-deck">
            <div id="search-wrapper">
                <input id="chip-search" placeholder="SEARCH LOGS..." />
                <button id="clear-search">✕</button>
            </div>
            <div id="chip-container"></div>
        </section>
        <div id="trash-slot">🗑 TRASH</div>

        <main id="editor-container">
            <div id="editor" contenteditable="true" placeholder="JACK IN! ENTER DATA..."></div>
        </main>

        <footer>
            <button id="save-btn">UPLOAD DATA</button>
            <button id="config-btn">CONFIG</button>
        </footer>
    </div>

    <!-- Token Entry Modal -->
    <div id="modal" class="hidden">
        <div class="modal-content">
            <h3>SET ACCESS TOKEN</h3>
            <input type="password" id="gh-token" placeholder="GitHub PAT...">
            <input type="text" id="gh-repo" placeholder="username/repo-name">
            <button id="setup-confirm">INITIALIZE</button>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="confirm-modal" class="hidden">
        <div class="confirm-box">
            <h3>DELETE CHIP?</h3>
            <p>This action cannot be undone.</p>

            <div class="confirm-actions">
                <button id="confirm-yes">YES</button>
                <button id="confirm-no">NO</button>
            </div>
        </div>
    </div>

    <div id="logout-modal" class="hidden confirm-modal">
        <div class="confirm-box">
            <h3>DISCONNECT PET?</h3>

            <div class="confirm-actions">
                <button id="logout-yes">YES</button>
                <button id="logout-no">NO</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
